<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>Geeta Audio Sync Tool</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#f4f6f9" />

  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <link rel="apple-touch-icon" href="gat_library/images/swami_hariharji_with_audio_symbol.png" />
  <link rel="icon" href="gat_library/images/guru_wave_favicon.ico" />

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />

  <!-- Your Design System -->
  <link rel="stylesheet" href="gat_library/css/gat_audio_sync_style.css" />
</head>

<body class="sync-page">
  <div class="page-wrap">

    <!-- HEADER -->
    <div class="sync-header">
      <a href="index.html" class="btn btn-outline-secondary btn-back-home">← Back to Reader</a>
      <h1 class="sync-title">🎧 Geeta Audio Sync Tool</h1>
      <div class="sync-header-spacer"></div>
    </div>

    <!-- DASHBOARD -->
    <div class="dashboard-grid">

      <!-- AUDIO PANEL -->
      <div class="card card--stretch">
        <h3>🎵 Audio Source &amp; Naming</h3>

        <!-- Searchable audio -->
        <div class="input-row audio-select-row">
          <div class="select-container">
            <input
              id="searchSelect"
              class="searchable-select"
              placeholder="Search audio files..."
              autocomplete="off"
            />
            <div id="optionsContainer" class="options-container hidden"></div>
          </div>
        </div>

        <!-- URL -->
        <div class="input-row audio-url-row">
          <input type="text" id="fileUrlInput" placeholder="Paste audio URL..." />
          <button type="button" onclick="loadAudio()">Load</button>
        </div>

        <!-- File -->
        <div class="input-row audio-file-row">
          <input type="file" id="fileInput" accept="audio/*" />
        </div>

        <!-- Naming -->
        <div class="input-row naming-row">
          <input type="text" id="prefixInput" placeholder="Prefix (BG_)" />
          <input type="text" id="suffixInput" placeholder="Suffix (_EN)" />
        </div>

        <audio id="audioPlayer" controls preload="metadata"></audio>
      </div>

      <!-- JSON PANEL -->
      <div class="card card--stretch">
        <h3>📊 JSON Data Management</h3>

        <div class="input-row json-actions-row">
          <input
            type="file"
            id="loadJsonInput"
            style="display:none"
            accept=".json,application/json"
            onchange="loadJsonFile(event)"
          />
          <button type="button" onclick="document.getElementById('loadJsonInput').click()">Load JSON</button>

          <select id="systemJsonSelect" onchange="loadSystemJson(this.value)">
            <option value="">📥 Load System JSON</option>
            <option value="data/geeta_complete.json">Geeta Complete</option>
            <option value="data/geeta_twelfth_chapter.json">Chapter 12</option>
          </select>

          <button type="button" onclick="copyShareLink()" class="btn-green">🔗 Share</button>
          <button type="button" onclick="copyJsonData()">Copy</button>
          <button type="button" onclick="saveData()">Save</button>
        </div>

        <textarea id="jsonDataInput" placeholder="JSON output..."></textarea>

        <div id="progressContainer">
          <div class="progress-bg">
            <div id="progressBar"></div>
          </div>
          <small id="progressText">Progress: 0%</small>
        </div>
      </div>

    </div>

    <!-- TIMELINE -->
    <div class="card timeline-card">
      <div class="section-header">
        <h3>🧠 Timeline Editor</h3>
        <div id="loadingIndicator" class="hidden loading-inline">Loading JSON...</div>
      </div>

      <div class="timeline-search-wrap">
        <span class="timeline-search-icon">🔎</span>
        <input type="text" id="tableSearch" placeholder="Search..." />
      </div>

      <div class="timeline-table-wrap">
        <table id="timestampsTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Start</th>
              <th>End</th>
              <th>Duration</th>
              <th>Name</th>
              <th>Text</th>
              <th>Segment</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- FLOATING CONTROLS -->
  <div id="floatingControlBar" class="floating-bar">
    <button id="floatUndoBtn" class="float-btn" title="Undo (Ctrl+Z)">↩️</button>
    <div id="floatTimer" class="float-timer">00:00 / 00:00</div>
    <button id="floatPlayBtn" class="float-btn play-btn" title="Play/Pause (Spacebar)">⏯️</button>
    <button id="floatMarkBtn" class="float-btn mark-btn" title="Mark End ( ] )">📍</button>
    <button id="floatDeleteBtn" class="float-btn delete-btn" title="Delete Last">🗑️</button>
    <button id="floatRedoBtn" class="float-btn" title="Redo (Ctrl+Y)">↪️</button>
  </div>

 <!-- LOADING -->
<div id="busyOverlay" class="busy-overlay hidden" aria-live="polite" aria-busy="true">
  <div class="busy-card">
    <div class="busy-spinner"></div>
    <div id="busyText" class="busy-text">Loading...</div>
  </div>
</div>

<div id="toastRoot" class="toast-root"></div>

<!-- QR Code Library -->
<!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script> -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/lib/browser.min.js"></script>

<!-- Your logic -->
<script src="gat_library/js/gat_audio_sync_script.js"></script>

<!-- Service Worker -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(err => {
        console.error('PWA SW Registration failed:', err);
      });
    });
  }
</script>
</body>
</html>
