<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Srimad Bhagavad Gita</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f4f6f9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<body>
    <div class="container mt-4">
        <div class="text-right mb-3">
            <a href="audio_sync.html" class="btn btn-outline-info btn-sm shadow-sm">
                🛠️ Open Audio Sync Tool
            </a>
        </div>
            
        <div id="filterBox" class="row justify-content-center">
            <div class="col-md-6">
                <h1 class="text-center mb-4">Srimad Bhagavad Gita</h1>
                <div class="form-group">
                    <label for="chapterSelect">Select Chapter:</label>
                    <select id="chapterSelect" class="form-control">
                        <!-- Options will be added dynamically by JavaScript -->
                    </select>
                </div>
                <div class="form-group">
                    <label for="searchInput">Search Word:</label>
                    <input type="text" id="searchInput" class="form-control" placeholder="Search word...">
                </div>
                <button id="searchButton" class="btn btn-primary search-button">Search</button>
                <button id="clearButton" class="btn btn-danger clear-button">Clear Results</button>
                <div class="toggle-buttons btn-group mt-3" role="group">
<!--                     <label class="switch"><input type="checkbox" id="sanskrit-toggle" checked><span class="slider round"></span></label>
                    <p>Sanskrit Verse</p>
                    <label class="switch"><input type="checkbox" id="english-toggle" checked><span class="slider round"></span></label>
                    <p>English Verse</p>
                    <label class="switch"><input type="checkbox" id="hindi-toggle" checked><span class="slider round"></span></label>
                    <p>Hindi Meaning</p>
                    <label class="switch"><input type="checkbox" id="description-toggle" checked><span class="slider round"></span></label>
                    <p>English Meaning</p> -->
                </div>
            </div>
        </div>
        <div class="row justify-content-center mt-4">
            <div class="col-md-8">
                <div class="result-container" id="searchResults"></div>
            </div>
            <div class="col-md-8">
                <div class="result-container" id="container"></div>
            </div>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/110/three.min.js"></script>
    <script src="app.js"></script>

</html>
