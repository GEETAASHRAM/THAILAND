<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Srimad Bhagavad Gita</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f4f6f9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="gat_library/images/swami_hariharji_with_audio_symbol.png"> 
    <link rel="icon" href="gat_library/images/favicon_swamiharihar_ji_maharaj.ico">

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="gat_library/css/gat_audio_sync_style.css"> 
</head>
<body>
    <div class="container mt-4">
        
        <div class="d-flex justify-content-between mb-3">
            <button id="btnOpenSubModal" class="btn btn-warning btn-sm shadow-sm">📅 Subscribe to Daily Reading</button>
            <a href="audio_sync.html" class="btn btn-outline-info btn-sm shadow-sm">🛠️ Open Audio Sync Tool</a>
        </div>
            
        <div id="filterBox" class="row justify-content-center">
            <div class="col-md-6">
                <h1 class="text-center mb-4">Srimad Bhagavad Gita</h1>
                
                <div class="form-group">
                    <label for="chapterSelect">Select Chapter:</label>
                    <select id="chapterSelect" class="form-control">
                        </select>
                </div>
                
                <div class="form-group">
                    <label for="searchInput">Search Word:</label>
                    <input type="text" id="searchInput" class="form-control" placeholder="Search word...">
                </div>
                
                <button id="searchButton" class="btn btn-primary search-button mb-2">Search</button>
                <button id="clearButton" class="btn btn-danger clear-button mb-2">Clear Results</button>
                
                <button id="globalPresentationBtn" class="btn btn-info mb-2 shadow-sm" style="display:none;">🎤 Presentation Mode</button>
                
                <div class="toggle-buttons btn-group mt-3" role="group">
                    </div>
            </div>
        </div>
        
        <div class="row justify-content-center mt-4">
            <div class="col-md-8">
                <div class="result-container" id="searchResults"></div>
            </div>
            <div class="col-md-8">
                <div class="result-container" id="container"></div>
            </div>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/110/three.min.js"></script>
    <script src="gat_library/js/app.js"></script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js').then(reg => {
            console.log('PWA Service worker registered.', reg);
          }).catch(err => console.error('PWA SW Registration failed:', err));
        });
      }
    </script>
</body>
</html>
